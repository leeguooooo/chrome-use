name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A new PR commit makes its older run obsolete. Main uses the commit SHA so a
# later documentation-only push cannot displace an unverified code revision.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      run_heavy: ${{ steps.changes.outputs.run_heavy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect documentation-only changes
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          run_heavy=true

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if git diff --quiet "origin/${BASE_REF}...HEAD" -- . ':(exclude)docs/**'; then
              run_heavy=false
            fi
          elif [[ "$EVENT_NAME" == "push" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            if git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- . ':(exclude)docs/**'; then
              run_heavy=false
            fi
          fi

          echo "run_heavy=$run_heavy" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Check version sync
        run: node scripts/check-version-sync.js

      - name: Run extension tests
        if: steps.changes.outputs.run_heavy == 'true'
        run: node --test extensions/ab-connect/*.test.js

      - name: Warn when doc sources change without their generated pages
        if: github.event_name == 'pull_request'
        env:
          DOCS_CHECK_GHA: "1"
          DOCS_CHECK_DIFF: origin/${{ github.base_ref }}...HEAD
        run: node scripts/check-docs-staleness.js

      - name: Setup Rustfmt
        if: steps.changes.outputs.run_heavy == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        if: steps.changes.outputs.run_heavy == 'true'
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

  rust:
    name: Rust Tests
    needs: preflight
    if: needs.preflight.outputs.run_heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          shared-key: linux-ci

      - name: Run Rust tests
        if: github.event_name == 'pull_request'
        run: cargo test --profile ci --manifest-path cli/Cargo.toml

      # Enabling the internal feature here compiles the ignored browser tests
      # into the same test binary. The following E2E step can then reuse it.
      - name: Run Rust tests with E2E support
        if: github.event_name != 'pull_request'
        run: cargo test --profile ci --features e2e-tests --manifest-path cli/Cargo.toml

      - name: Verify preinstalled Chrome
        if: github.event_name != 'pull_request'
        run: google-chrome --version

      - name: Install ffmpeg
        if: github.event_name != 'pull_request'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Run native E2E tests
        if: github.event_name != 'pull_request'
        env:
          AGENT_BROWSER_ALLOW_HEADLESS: "1"
          AGENT_BROWSER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: cargo test --profile ci --features e2e-tests --manifest-path cli/Cargo.toml e2e -- --ignored --test-threads=1

  rust-lint:
    name: Rust Clippy
    needs: preflight
    if: needs.preflight.outputs.run_heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          shared-key: linux-ci

      # Clippy runs beside the test job instead of adding its separate full
      # dependency compilation to the test job's critical path.
      - name: Clippy check
        run: cargo clippy --profile ci --manifest-path cli/Cargo.toml -- -D warnings

  rust-e2e-compile:
    name: Rust E2E Compile
    needs: preflight
    if: needs.preflight.outputs.run_heavy == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          shared-key: linux-ci

      # Keep the large browser test module out of ordinary PR test binaries,
      # but compile-check it in parallel so broken E2E code cannot be merged.
      - name: Check E2E test code
        run: cargo check --profile ci --tests --features e2e-tests --manifest-path cli/Cargo.toml

  rust-cross:
    name: Rust (${{ matrix.os }} - ${{ matrix.target }})
    needs: preflight
    if: needs.preflight.outputs.run_heavy == 'true' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          # Run Intel tests natively. Running them through Rosetta on the arm64
          # runner was the slowest and flakiest leg in the entire workflow.
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}-ci

      - name: Run Rust tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

  windows-integration:
    name: Windows Integration and Global Install
    needs: preflight
    if: needs.preflight.outputs.run_heavy == 'true' && github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      AGENT_BROWSER_ALLOW_HEADLESS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: x86_64-pc-windows-msvc-release

      - name: Build Rust CLI
        run: cargo build --release --manifest-path cli/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Copy CLI binary to bin directory
        run: |
          Copy-Item cli/target/x86_64-pc-windows-msvc/release/chrome-use.exe bin/chrome-use-win32-x64.exe

      - name: Test chrome-use install command
        run: |
          $env:PATH = "$pwd\bin;$env:PATH"
          for ($i = 1; $i -le 3; $i++) {
            bin/chrome-use-win32-x64.exe install
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "Attempt $i failed, retrying in 10 seconds..."
            Start-Sleep -Seconds 10
          }
          exit 1
        shell: pwsh
        timeout-minutes: 10

      - name: Test chrome-use extension install
        run: |
          $env:PATH = "$pwd\bin;$env:PATH"
          bin/chrome-use-win32-x64.exe extension install --json
          if ($LASTEXITCODE -ne 0) { Write-Host "extension install failed"; exit 1 }
          $key = "HKCU:\Software\Google\Chrome\NativeMessagingHosts\com.agent_browser.connect"
          $manifest = (Get-ItemProperty -Path $key -ErrorAction Stop).'(default)'
          if (-not (Test-Path $manifest)) { Write-Host "manifest missing: $manifest"; exit 1 }
          Write-Host "OK: registered host manifest at $manifest"
        shell: pwsh
        timeout-minutes: 5

      - name: Test daemon lifecycle
        run: |
          $env:PATH = "$pwd\bin;$env:PATH"
          bin/chrome-use-win32-x64.exe --launch open https://example.com
          if ($LASTEXITCODE -ne 0) { Write-Error "open failed"; exit 1 }
          $snapshot = bin/chrome-use-win32-x64.exe snapshot
          if ($LASTEXITCODE -ne 0) { Write-Error "snapshot failed"; exit 1 }
          Write-Host $snapshot
          bin/chrome-use-win32-x64.exe close
          if ($LASTEXITCODE -ne 0) { Write-Error "close failed"; exit 1 }
        shell: pwsh
        timeout-minutes: 5

      # Reuse the release binary above instead of compiling it again in a
      # separate Windows global-install matrix job.
      - name: Test npm global install
        run: |
          npm pack
          npm install -g chrome-use-*.tgz
          chrome-use --version
        shell: bash

      - name: Verify installed CLI works
        run: |
          $ver = chrome-use --version
          if ($LASTEXITCODE -ne 0) { Write-Error "chrome-use --version failed"; exit 1 }
          Write-Host "CLI version: $ver"
          $content = Get-Content "$(npm prefix -g)\chrome-use.cmd" -Raw
          Write-Host "Shim content:"
          Write-Host $content
          if ($content -match "chrome-use-win32-x64\.exe") {
            Write-Host "OK: shim points directly to the native binary"
          } else {
            Write-Host "INFO: shim uses the functional JavaScript wrapper"
          }
        shell: pwsh

  global-install:
    name: Global Install (${{ matrix.os }})
    needs: preflight
    if: needs.preflight.outputs.run_heavy == 'true' && github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: chrome-use-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: chrome-use-darwin-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}-release

      - name: Build Rust CLI
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Copy CLI binary to bin directory
        run: cp cli/target/${{ matrix.target }}/release/chrome-use bin/${{ matrix.binary }}

      - name: Test npm global install
        run: |
          npm pack
          npm install -g chrome-use-*.tgz
          chrome-use --version
        shell: bash

      - name: Verify symlink points to native binary
        run: |
          SYMLINK=$(npm prefix -g)/bin/chrome-use
          TARGET=$(readlink "$SYMLINK")
          echo "Symlink: $SYMLINK"
          echo "Target: $TARGET"
          if [[ "$TARGET" != *"${{ matrix.binary }}"* ]]; then
            echo "ERROR: Symlink should point to native binary, not JavaScript wrapper"
            exit 1
          fi
          echo "Symlink correctly points to native binary"
        shell: bash
